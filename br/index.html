<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Pink Backrooms - Heart & Ribbon</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #fff;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
        }
        #ui {
            position: absolute;
            top: 15px;
            left: 15px;
            color: #ffb6c1;
            text-shadow: 1px 1px 2px #fff, -1px -1px 2px #fff;
            pointer-events: none;
            font-size: 14px;
            z-index: 10;
        }
        
        /* 모바일 가상 조이스틱 */
        #joystick-zone {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.6);
            border: 2px solid rgba(255, 182, 193, 0.8);
            border-radius: 50%;
            z-index: 20;
            touch-action: none;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
        }
        #joystick-stick {
            position: absolute;
            top: 35px;
            left: 35px;
            width: 50px;
            height: 50px;
            background: #ffb6c1;
            border-radius: 50%;
            transition: transform 0.05s linear;
        }

        #touch-hint {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: #ffb6c1;
            font-size: 12px;
            pointer-events: none;
            text-align: right;
            font-weight: bold;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>
    
    <div id="ui">
        <h3 style="margin:0; color:#ff69b4;">♥ PINK ROOMS ♥</h3>
        <p style="margin:5px 0 0 0; font-weight:bold;">하트와 리본의 무한 공간</p>
    </div>

    <div id="touch-hint">화면 우측 드래그: 시선 회전</div>

    <div id="joystick-zone">
        <div id="joystick-stick"></div>
    </div>

    <script>
        const CHUNK_SIZE = 30; 
        const WALL_HEIGHT = 4;
        const GRID_SIZE = 3;   
        
        let scene, camera, renderer;
        let moveX = 0, moveZ = 0; 
        let velocity = new THREE.Vector3();
        let prevTime = performance.now();
        
        let yaw = 0, pitch = 0;
        const mobileSensitivity = 0.005;

        const loadedChunks = new Map();
        const wallsArray = [];

        const container = document.getElementById('canvas-container');
        const joystickZone = document.getElementById('joystick-zone');
        const joystickStick = document.getElementById('joystick-stick');

        // --- 캔버스를 이용한 '하얀 바탕 + 연핑크 땡땡이' 동적 텍스처 생성 ---
        function createPolkaDotTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');

            // 배경: 하얀색
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 패턴: 작은 연핑크 땡땡이 (반복 격자 구조)
            ctx.fillStyle = '#ffb6c1'; 
            const dotRadius = 6; // 작은 크기
            const spacing = 64;  // 조밀한 배치

            for (let x = 0; x <= canvas.width; x += spacing) {
                for (let y = 0; y <= canvas.height; y += spacing) {
                    ctx.beginPath();
                    ctx.arc(x, y, dotRadius, 0, Math.PI * 2);
                    ctx.fill();

                    // 엇갈린 배치 추가로 자연스럽게
                    ctx.beginPath();
                    ctx.arc(x + spacing/2, y + spacing/2, dotRadius, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(2, 2); // 청크 안에서 적당히 반복되도록 설정
            return texture;
        }

        // --- 3D 대형 하트 형상 생성 함수 ---
        function createHeartGeometry() {
            const shape = new THREE.Shape();
            // 하트 커브 방정식 베이스 매핑 (크게 구현하기 위해 스케일 업)
            shape.moveTo(0, 0);
            shape.bezierCurveTo(2, 3, 4, 3, 4, 0);
            shape.bezierCurveTo(4, -3, 1, -5, 0, -7);
            shape.bezierCurveTo(-1, -5, -4, -3, -4, 0);
            shape.bezierCurveTo(-4, 3, -2, 3, 0, 0);

            // 두께를 주어 3D 볼륨감 형성
            const extrudeSettings = { depth: 0.8, bevelEnabled: true, bevelSegments: 3, steps: 1, bevelSize: 0.2, bevelThickness: 0.2 };
            const geometry = new THREE.ExtrudeGeometry(shape, extrudeSettings);
            geometry.center();
            // 위아래가 뒤집히는 것 방지 및 적정 크기 조절 (하트는 크게!)
            geometry.rotateZ(Math.PI);
            geometry.scale(0.5, 0.5, 0.5);
            return geometry;
        }

        // --- 3D 리본 형상 생성 함수 ---
        function createRibbonGeometry() {
            const group = new THREE.Group();
            const material = new THREE.MeshStandardMaterial({ color: 0xff69b4, roughness: 0.4 }); // 진분홍 리본

            // 왼쪽 날개 (원뿔 변형)
            const leftWingGeo = new THREE.ConeGeometry(1.5, 3, 4);
            leftWingGeo.rotateZ(Math.PI / 2);
            const leftWing = new THREE.Mesh(leftWingGeo, material);
            leftWing.position.x = -1.5;
            group.add(leftWing);

            // 오른쪽 날개
            const rightWingGeo = new THREE.ConeGeometry(1.5, 3, 4);
            rightWingGeo.rotateZ(-Math.PI / 2);
            const rightWing = new THREE.Mesh(rightWingGeo, material);
            rightWing.position.x = 1.5;
            group.add(rightWing);

            // 가운데 매듭 (구체)
            const knotGeo = new THREE.SphereGeometry(0.7, 16, 16);
            const knot = new THREE.Mesh(knotGeo, material);
            group.add(knot);

            // 아래로 늘어진 끈 2개
            const tailGeo = new THREE.CylinderGeometry(0.2, 0.4, 2, 8);
            tailGeo.rotateZ(0.3);
            const leftTail = new THREE.Mesh(tailGeo, material);
            leftTail.position.set(-0.6, -1.5, 0);
            group.add(leftTail);

            const rightTail = leftTail.clone();
            rightTail.position.x = 0.6;
            rightTail.rotation.z = -0.3;
            group.add(rightTail);

            return group;
        }

        // --- 모바일 터치 이벤트 (시선 회전) ---
        let touchStartId = null;
        let prevTouchX = 0, prevTouchY = 0;

        window.addEventListener('touchstart', (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                let touch = e.changedTouches[i];
                if (touch.clientX > window.innerWidth / 2 && touchStartId === null) {
                    touchStartId = touch.identifier;
                    prevTouchX = touch.clientX;
                    prevTouchY = touch.clientY;
                }
            }
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                let touch = e.changedTouches[i];
                if (touch.identifier === touchStartId) {
                    let deltaX = touch.clientX - prevTouchX;
                    let deltaY = touch.clientY - prevTouchY;

                    yaw -= deltaX * mobileSensitivity;
                    pitch -= deltaY * mobileSensitivity;
                    pitch = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, pitch));

                    prevTouchX = touch.clientX;
                    prevTouchY = touch.clientY;
                }
            }
        }, { passive: false });

        window.addEventListener('touchend', (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                if (e.changedTouches[i].identifier === touchStartId) {
                    touchStartId = null;
                }
            }
        });

        // --- 가상 조이스틱 로직 (이동) ---
        let joystickTouchId = null;
        const joystickCenter = { x: 60, y: 60 };
        const maxRadius = 45;

        joystickZone.addEventListener('touchstart', (e) => {
            if (joystickTouchId === null) {
                let touch = e.changedTouches[0];
                joystickTouchId = touch.identifier;
                handleJoystick(touch);
            }
        }, { passive: false });

        joystickZone.addEventListener('touchmove', (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                let touch = e.changedTouches[i];
                if (touch.identifier === joystickTouchId) {
                    handleJoystick(touch);
                }
            }
        }, { passive: false });

        joystickZone.addEventListener('touchend', (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                if (e.changedTouches[i].identifier === joystickTouchId) {
                    joystickTouchId = null;
                    moveX = 0; moveZ = 0;
                    joystickStick.style.transform = `translate(0px, 0px)`;
                }
            }
        });

        function handleJoystick(touch) {
            let rect = joystickZone.getBoundingClientRect();
            let touchX = touch.clientX - rect.left;
            let touchY = touch.clientY - rect.top;

            let deltaX = touchX - joystickCenter.x;
            let deltaY = touchY - joystickCenter.y;
            let distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);

            if (distance > maxRadius) {
                deltaX = (deltaX / distance) * maxRadius;
                deltaY = (deltaY / distance) * maxRadius;
                distance = maxRadius;
            }

            joystickStick.style.transform = `translate(${deltaX}px, ${deltaY}px)`;
            moveX = deltaX / maxRadius;
            moveZ = deltaY / maxRadius; 
        }

        // --- 게임 초기화 ---
        let polkaDotTexture;
        let heartGeo;

        function init() {
            scene = new THREE.Scene();
            // 안개도 화사하고 몽환적인 핑크빛 연무로 교체
            scene.fog = new THREE.FogExp2(0xfff0f5, 0.04); 

            camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 1.6, 0);

            renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0xfff0f5); // 베이스 배경색 (LavenderBlush 핑크)
            container.appendChild(renderer.domElement);

            // 공통 에셋 프리로드
            polkaDotTexture = createPolkaDotTexture();
            heartGeo = createHeartGeometry();

            // 조명 (화사하고 밝은 백색광 + 핑크 무드광)
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);

            const pinkLight = new THREE.PointLight(0xffc0cb, 0.9, 15);
            pinkLight.position.set(0, 2, 0);
            camera.add(pinkLight);
            scene.add(camera);

            window.addEventListener('resize', onWindowResize);
            
            updateChunks();
            animate();
        }

        function pseudoRandom(x, z) {
            let cx = Math.sin(x * 12.9898 + z * 78.233) * 43758.5453123;
            return cx - Math.floor(cx);
        }

        // --- 절차적 핑크룸 청크 생성 ---
        function createChunk(chunkX, chunkZ) {
            const chunkKey = `${chunkX},${chunkZ}`;
            if (loadedChunks.has(chunkKey)) return;

            const chunkGroup = new THREE.Group();
            const startX = chunkX * CHUNK_SIZE;
            const startZ = chunkZ * CHUNK_SIZE;

            // 1. 바닥 (하얀 바탕 + 연핑크 땡땡이)
            const floorGeo = new THREE.PlaneGeometry(CHUNK_SIZE, CHUNK_SIZE);
            const floorMat = new THREE.MeshStandardMaterial({ map: polkaDotTexture, roughness: 0.8 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.position.set(startX + CHUNK_SIZE/2, 0, startZ + CHUNK_SIZE/2);
            chunkGroup.add(floor);

            // 2. 천장 (바닥과 동일 패턴 매핑)
            const ceiling = floor.clone();
            ceiling.rotation.x = Math.PI / 2;
            ceiling.position.y = WALL_HEIGHT;
            chunkGroup.add(ceiling);

            // 3. 미로 기둥 및 구조물 배치 (하트 & 리본)
            const heartMat = new THREE.MeshStandardMaterial({ color: 0xff1493, roughness: 0.3, metalness: 0.1 }); // 핫핑크 대형 하트
            const step = CHUNK_SIZE / GRID_SIZE;

            for (let i = 0; i <= GRID_SIZE; i++) {
                for (let j = 0; j <= GRID_SIZE; j++) {
                    let rand = pseudoRandom(chunkX * 9 + i, chunkZ * 11 + j);
                    
                    if (rand > 0.6) { 
                        let wpX = startX + i * step;
                        let wpZ = startZ + j * step;

                        // 스폰 구역 통로 보장
                        if (Math.abs(wpX) < 5 && Math.abs(wpZ) < 5) continue;

                        let objectContainer = new THREE.Group();
                        objectContainer.position.set(wpX, WALL_HEIGHT / 2, wpZ);

                        // 난수값에 따라 커다란 하트 또는 리본 배치
                        if (rand > 0.8) {
                            // 대형 하트 배치
                            const heartMesh = new THREE.Mesh(heartGeo, heartMat);
                            heartMesh.scale.set(1.4, 1.4, 1.4); // 크게 확장
                            objectContainer.add(heartMesh);
                        } else {
                            // 리본 배치
                            const ribbon = createRibbonGeometry();
                            ribbon.scale.set(1.2, 1.2, 1.2);
                            objectContainer.add(ribbon);
                        }

                        // 충돌 영역 설정을 위한 보이지 않는 벽 컬라이더 결합
                        const colliderGeo = new THREE.BoxGeometry(3.5, WALL_HEIGHT, 3.5);
                        const colliderMat = new THREE.MeshBasicMaterial({ visible: false }); // 눈엔 안 보임
                        const collider = new THREE.Mesh(colliderGeo, colliderMat);
                        objectContainer.add(collider);

                        chunkGroup.add(objectContainer);
                        wallsArray.push(collider); // 안 보이는 컬라이더 박스로 벽 충돌 체크
                    }
                }
            }

            scene.add(chunkGroup);
            loadedChunks.set(chunkKey, chunkGroup);
        }

        function updateChunks() {
            const pX = Math.floor(camera.position.x / CHUNK_SIZE);
            const pZ = Math.floor(camera.position.z / CHUNK_SIZE);
            
            const renderDistance = 1; 
            const currentKeys = new Set();

            for (let x = -renderDistance; x <= renderDistance; x++) {
                for (let z = -renderDistance; z <= renderDistance; z++) {
                    createChunk(pX + x, pZ + z);
                    currentKeys.add(`${pX + x},${pZ + z}`);
                }
            }

            for (let [key, group] of loadedChunks.entries()) {
                if (!currentKeys.has(key)) {
                    scene.remove(group);
                    group.children.forEach(container => {
                        // 그룹 컨테이너 안의 투명 컬라이더를 찾아서 해제
                        if(container.children) {
                            container.children.forEach(child => {
                                let idx = wallsArray.indexOf(child);
                                if(idx > -1) wallsArray.splice(idx, 1);
                            });
                        }
                    });
                    loadedChunks.delete(key);
                }
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- 충돌 감지 함수 ---
        function checkCollision(newPos) {
            const playerRadius = 0.8; // 플레이어 볼륨 확보
            for (let wall of wallsArray) {
                let bbox = new THREE.Box3().setFromObject(wall);
                if (newPos.x + playerRadius > bbox.min.x && newPos.x - playerRadius < bbox.max.x &&
                    newPos.z + playerRadius > bbox.min.z && newPos.z - playerRadius < bbox.max.z) {
                    return true;
                }
            }
            return false;
        }

        // --- 루프 애니메이션 ---
        function animate() {
            requestAnimationFrame(animate);

            const time = performance.now();
            const delta = Math.min((time - prevTime) / 1000, 0.1);
            prevTime = time;

            const cameraTarget = new THREE.Vector3();
            cameraTarget.x = Math.sin(yaw) * Math.cos(pitch);
            cameraTarget.y = Math.sin(pitch);
            cameraTarget.z = Math.cos(yaw) * Math.cos(pitch);
            camera.lookAt(camera.position.clone().add(cameraTarget));

            if (moveX !== 0 || moveZ !== 0) {
                const camLookXZ = new THREE.Vector3(cameraTarget.x, 0, cameraTarget.z).normalize();
                const camRightXZ = new THREE.Vector3().crossVectors(camLookXZ, new THREE.Vector3(0, 1, 0)).normalize();

                let moveVector = new THREE.Vector3()
                    .addScaledVector(camLookXZ, -moveZ * 5.0 * delta) 
                    .addScaledVector(camRightXZ, moveX * 5.0 * delta); 
                
                let oldPosition = camera.position.clone();
                let newPosition = camera.position.clone().add(moveVector);

                let testPos = oldPosition.clone();
                testPos.x = newPosition.x;
                if (!checkCollision(testPos)) {
                    camera.position.x = newPosition.x;
                }
                
                testPos = oldPosition.clone();
                testPos.z = newPosition.z;
                if (!checkCollision(testPos)) {
                    camera.position.z = newPosition.z;
                }

                updateChunks();
            }

            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
