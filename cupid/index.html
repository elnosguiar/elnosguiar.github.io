<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>In-Yeon P2P: 실시간 채팅</title>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/sea.js"></script>
    <style>
        :root { --primary: #8b5cf6; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        input { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; margin: 5px 0; }
        #chat-ui { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 100; padding: 15px; box-sizing: border-box; flex-direction: column; }
        #messages { flex: 1; overflow-y: auto; background: #000; padding: 10px; border-radius: 10px; margin-bottom: 10px; }
        .msg { margin: 5px 0; padding: 8px 12px; border-radius: 15px; max-width: 80%; word-break: break-all; }
        .msg.me { background: var(--primary); margin-left: auto; }
        .msg.them { background: #334155; }
        .user-card { background: var(--card); padding: 12px; margin: 8px 0; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #334155; }
    </style>
</head>
<body>

<div id="auth-screen">
    <h2>✨ 인연 매칭</h2>
    <input id="alias" placeholder="닉네임">
    <input id="pass" type="password" placeholder="비밀번호">
    <button onclick="handleAuth()">접속하기</button>
</div>

<div id="lobby-screen" style="display:none;">
    <h3 id="welcome"></h3>
    <p style="font-size: 12px; color: #94a3b8;">다른 기기에서 다른 닉네임으로 접속하면 아래에 나타납니다.</p>
    <div id="peer-list"></div>
</div>

<div id="chat-ui">
    <button onclick="closeChat()" style="width: auto; background: #475569;">뒤로가기</button>
    <h3 id="chat-target">상대방</h3>
    <div id="messages"></div>
    <div style="display: flex; gap: 5px;">
        <input id="chat-input" placeholder="메시지 입력...">
        <button onclick="sendMessage()" style="width: 80px;">전송</button>
    </div>
</div>

<script>
    // 릴레이 서버 리스트
    const gun = Gun(['https://gun-manhattan.herokuapp.com/gun', 'https://relay.peer.ooo/gun']);
    const user = gun.user().recall({storage: true});
    let currentPeerPub = null;

    async function handleAuth() {
        const alias = document.getElementById('alias').value;
        const pass = document.getElementById('pass').value;
        user.auth(alias, pass, (ack) => {
            if (ack.err) user.create(alias, pass, () => handleAuth());
            else startApp(alias);
        });
    }

    function startApp(alias) {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('lobby-screen').style.display = 'block';
        document.getElementById('welcome').innerText = `${alias}님 온라인`;

        // 1. 공용 디스커버리 채널에 내 신호 등록
        // 키 이름을 유니크하게 변경하여 충돌 방지
        const discovery = gun.get('in-yeon-global-v10'); 
        discovery.get(user.is.pub).put({ name: alias, t: Date.now() });

        // 2. 다른 유저 실시간 감시
        discovery.map().on((data, pub) => {
            if (!data || pub === user.is.pub) return;
            if (Date.now() - data.t > 600000) return; // 10분 내 신호만

            let el = document.getElementById(pub);
            if (!el) {
                el = document.createElement('div');
                el.id = pub;
                el.className = 'user-card';
                document.getElementById('peer-list').appendChild(el);
            }
            el.innerHTML = `<span><strong>${data.name}</strong></span> 
                            <button onclick="openChat('${pub}', '${data.name}')" style="width:80px; padding:5px;">채팅</button>`;
        });
    }

    // 3. 채팅창 열기
    function openChat(pub, name) {
        currentPeerPub = pub;
        document.getElementById('chat-target').innerText = name + "님과의 대화";
        document.getElementById('chat-ui').style.display = 'flex';
        document.getElementById('messages').innerHTML = ''; // 초기화

        // 상대방과 나 사이의 공용 채널 구독 (정렬된 PUB 키 조합)
        const channelID = [user.is.pub, pub].sort().join('_');
        gun.get('chats').get(channelID).map().on((msg) => {
            if (!msg) return;
            renderMsg(msg.text, msg.from === user.is.pub ? 'me' : 'them');
        });
    }

    // 4. 메시지 전송
    function sendMessage() {
        const input = document.getElementById('chat-input');
        if (!input.value || !currentPeerPub) return;

        const channelID = [user.is.pub, currentPeerPub].sort().join('_');
        gun.get('chats').get(channelID).set({
            text: input.value,
            from: user.is.pub,
            time: Date.now()
        });
        input.value = '';
    }

    function renderMsg(text, side) {
        const div = document.createElement('div');
        div.className = `msg ${side}`;
        div.innerText = text;
        const box = document.getElementById('messages');
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    function closeChat() {
        document.getElementById('chat-ui').style.display = 'none';
        currentPeerPub = null;
    }
</script>
</body>
</html>
