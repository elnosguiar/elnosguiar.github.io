<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>In-Yeon P2P: Debug Mode</title>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/sea.js"></script>
    <style>
        :root { --primary: #7c3aed; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .box { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 10px; }
        input { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: var(--primary); color: white; font-weight: bold; margin: 5px 0; }
        #debug-log { background: #000; color: #10b981; font-family: monospace; font-size: 11px; padding: 10px; height: 100px; overflow-y: auto; border-radius: 8px; border: 1px solid #10b98155; }
        .peer { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #334155; }
        #chat-ui { display:none; position:fixed; inset:0; background:var(--bg); flex-direction:column; padding:15px; z-index:100; }
        #msg-list { flex:1; overflow-y:auto; padding:10px; display:flex; flex-direction:column; }
        .m { margin: 5px 0; padding: 8px; border-radius: 8px; max-width: 80%; }
        .m.me { background: var(--primary); align-self: flex-end; }
        .m.them { background: #334155; align-self: flex-start; }
    </style>
</head>
<body>

<div id="lobby">
    <h2>✨ 인연 P2P (v12)</h2>
    
    <div class="box" id="auth-box">
        <input id="alias" placeholder="닉네임">
        <input id="pass" type="password" placeholder="비밀번호">
        <button onclick="doAuth()">로그인/가입</button>
    </div>

    <div class="box" id="peer-box" style="display:none;">
        <h4 id="my-id">접속 중...</h4>
        <div id="peer-list"></div>
    </div>

    <div id="debug-log">시스템 로그 대기 중...</div>
</div>

<div id="chat-ui">
    <button onclick="location.reload()" style="width:auto;">뒤로가기/종료</button>
    <h3 id="chat-with">대화</h3>
    <div id="msg-list"></div>
    <div style="display:flex;">
        <input id="msg-input" placeholder="메시지 입력...">
        <button onclick="doSend()" style="width:60px;">전송</button>
    </div>
</div>

<script>
    // 로그 표시 함수
    function log(m) {
        const d = document.getElementById('debug-log');
        d.innerHTML = `> ${m}<br>` + d.innerHTML;
        console.log(m);
    }

    // 1. 초기화 (가장 살아있는 릴레이 서버 위주)
    const gun = Gun([
        'https://gun-manhattan.herokuapp.com/gun',
        'https://relay.peer.ooo/gun'
    ]);
    const user = gun.user().recall({storage: true});

    async function doAuth() {
        const a = document.getElementById('alias').value;
        const p = document.getElementById('pass').value;
        if(!a || !p) return alert("입력 필수");

        log(`인증 시도: ${a}`);
        user.auth(a, p, ack => {
            if(ack.err) {
                log(`가입 시도...`);
                user.create(a, p, res => {
                    if(res.err) log(`에러: ${res.err}`);
                    else doAuth();
                });
            } else {
                log(`인증 성공!`);
                start(a);
            }
        });
    }

    function start(name) {
        document.getElementById('auth-box').style.display = 'none';
        document.getElementById('peer-box').style.display = 'block';
        document.getElementById('my-id').innerText = `나: ${name}`;

        // 2. 내 정보 전파 (키 충돌 방지를 위해 v12 사용)
        const discoveryKey = 'in-yeon-v12-discovery';
        const heart = () => {
            gun.get(discoveryKey).get(user.is.pub).put({name: name, time: Date.now()});
            log("내 신호 전송 중...");
        };
        heart();
        setInterval(heart, 15000);

        // 3. 리스트 감시
        gun.get(discoveryKey).map().on((data, pub) => {
            if(!data || pub === user.is.pub) return;
            if(Date.now() - data.time > 60000) return; // 1분 경과 무시

            log(`유저 발견: ${data.name}`);
            let el = document.getElementById(pub);
            if(!el) {
                el = document.createElement('div');
                el.id = pub;
                el.className = 'peer';
                document.getElementById('peer-list').appendChild(el);
            }
            el.innerHTML = `<span>${data.name}</span><button onclick="goChat('${pub}', '${data.name}')" style="width:60px; padding:5px;">대화</button>`;
        });
    }

    let currentRid = null;
    function goChat(pub, name) {
        currentRid = [user.is.pub, pub].sort().join('');
        document.getElementById('chat-ui').style.display = 'flex';
        document.getElementById('chat-with').innerText = `${name}님과 대화`;
        document.getElementById('msg-list').innerHTML = '';

        log(`채팅방 입장: ${currentRid}`);
        gun.get('msgs-v12').get(currentRid).map().on(data => {
            if(data) draw(data.msg, data.from === user.is.pub ? 'me' : 'them');
        });
    }

    function doSend() {
        const i = document.getElementById('msg-input');
        if(!i.value) return;
        gun.get('msgs-v12').get(currentRid).set({
            msg: i.value,
            from: user.is.pub,
            time: Date.now()
        });
        i.value = '';
    }

    function draw(m, s) {
        const div = document.createElement('div');
        div.className = `m ${s}`;
        div.innerText = m;
        const list = document.getElementById('msg-list');
        list.appendChild(div);
        list.scrollTop = list.scrollHeight;
    }
</script>
</body>
</html>
