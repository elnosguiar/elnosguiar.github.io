<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeerJS: 진짜 서버리스 채팅</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; }
        .box { background: #1e1e1e; padding: 15px; border-radius: 12px; margin-bottom: 10px; }
        input { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: none; background: #333; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #00cf7f; color: black; font-weight: bold; cursor: pointer; }
        #msgs { height: 200px; overflow-y: auto; border: 1px solid #333; padding: 10px; margin: 10px 0; }
    </style>
</head>
<body>

    <h2>🔗 PeerJS 직결 채팅</h2>

    <div class="box">
        <p>내 ID: <b id="my-id">생성 중...</b></p>
        <small>(이 ID를 상대방에게 알려주세요)</small>
    </div>

    <div class="box">
        <input id="peer-id" placeholder="상대방 ID 입력">
        <button onclick="connectToPeer()">상대방과 연결</button>
    </div>

    <div class="box" id="chat-zone" style="display:none;">
        <div id="msgs"></div>
        <input id="msg-input" placeholder="메시지 입력">
        <button onclick="send()">전송</button>
    </div>

    <script>
        const peer = new Peer(); // 고유 ID 자동 생성
        let conn;

        // 내 ID가 생성되었을 때
        peer.on('open', (id) => {
            document.getElementById('my-id').innerText = id;
        });

        // 상대방이 나에게 연결을 시도할 때
        peer.on('connection', (c) => {
            conn = c;
            setupChat();
        });

        function connectToPeer() {
            const targetId = document.getElementById('peer-id').value;
            conn = peer.connect(targetId);
            setupChat();
        }

        function setupChat() {
            document.getElementById('chat-zone').style.display = 'block';
            conn.on('data', (data) => {
                renderMsg(data, 'them');
            });
            conn.on('open', () => {
                renderMsg("연결 성공!", "system");
            });
        }

        function send() {
            const msg = document.getElementById('msg-input').value;
            conn.send(msg);
            renderMsg(msg, 'me');
            document.getElementById('msg-input').value = '';
        }

        function renderMsg(txt, side) {
            const div = document.createElement('div');
            div.innerText = `[${side}] ${txt}`;
            document.getElementById('msgs').appendChild(div);
        }
    </script>
</body>
</html>
