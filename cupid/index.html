<script>
    // 1. 서버 주소 최적화 (https 필수)
    const gun = Gun([
        'https://gun-manhattan.herokuapp.com/gun',
        'https://peer.wallie.io/gun',
        'https://relay.peer.ooo/gun'
    ]);
    const user = gun.user().recall({storage: true});

    function log(m) {
        const d = document.getElementById('debug-log');
        d.innerHTML = `> ${m}<br>` + d.innerHTML;
    }

    async function doAuth() {
        const a = document.getElementById('alias').value;
        const p = document.getElementById('pass').value;
        if(!a || !p) return alert("닉네임/비번 입력!");

        log(`인증 시도: ${a}`);
        user.auth(a, p, ack => {
            if(ack.err) {
                user.create(a, p, () => doAuth());
            } else {
                log("🎉 인증 성공! 리스트 대기...");
                start(a);
            }
        });
    }

    function start(name) {
        document.getElementById('auth-box').style.display = 'none';
        document.getElementById('peer-box').style.display = 'block';
        document.getElementById('my-id').innerText = `나: ${name}`;

        // 채널명을 더 유니크하게 변경 (v13)
        const discovery = gun.get('in-yeon-final-check-v13');

        // 내 정보 등록
        const heart = () => {
            discovery.get(user.is.pub).put({
                name: name,
                time: Date.now()
            }, (ack) => {
                if(!ack.err) log("📡 내 신호 발사 중...");
            });
        };
        heart();
        setInterval(heart, 10000);

        // 상대방 찾기 (강력한 리스너)
        discovery.map().on((data, pub) => {
            if(!data || !data.name || pub === user.is.pub) return;
            
            // 5분 이내 데이터만 표시
            if(Date.now() - data.time > 300000) return;

            log(`👤 발견: ${data.name}`);
            let el = document.getElementById(pub);
            if(!el) {
                el = document.createElement('div');
                el.id = pub;
                el.className = 'peer';
                document.getElementById('peer-list').appendChild(el);
            }
            el.innerHTML = `<span><b>${data.name}</b></span><button onclick="goChat('${pub}', '${data.name}')" style="width:70px; padding:5px;">대화</button>`;
        });
    }

    // 채팅 관련 (goChat, doSend)은 이전 코드와 동일하게 유지하되 
    // 경로만 'msgs-v13'으로 변경하여 새 방을 만드세요.
    function goChat(pub, name) {
        currentRid = [user.is.pub, pub].sort().join('');
        document.getElementById('chat-ui').style.display = 'flex';
        document.getElementById('chat-with').innerText = `${name}님과 대화`;
        document.getElementById('msg-list').innerHTML = '';

        log(`채팅방 연결: ${currentRid}`);
        gun.get('msgs-v13').get(currentRid).map().on(data => {
            if(data && data.msg) draw(data.msg, data.from === user.is.pub ? 'me' : 'them');
        });
    }

    function doSend() {
        const i = document.getElementById('msg-input');
        if(!i.value) return;
        gun.get('msgs-v13').get(currentRid).set({
            msg: i.value,
            from: user.is.pub,
            time: Date.now()
        });
        i.value = '';
    }

    function draw(m, s) {
        const div = document.createElement('div');
        div.className = `m ${s}`;
        div.innerText = m;
        const list = document.getElementById('msg-list');
        list.appendChild(div);
        list.scrollTop = list.scrollHeight;
    }
</script>
