<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>In-Yeon P2P: 인연</title>
    <!-- 라이브러리 로딩 순서 및 CDN 안정성 확보 -->
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gun/sea.js"></script>
    <style>
        :root { --primary: #8b5cf6; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 400px; }
        input { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 12px; border: 1px solid #334155; background: #1e293b; color: white; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--primary); color: white; font-weight: bold; font-size: 16px; cursor: pointer; }
        button:disabled { background: #4b5563; cursor: not-allowed; }
        #log { background: #000; padding: 10px; border-radius: 10px; height: 100px; overflow-y: auto; font-size: 11px; color: #10b981; margin: 15px 0; border: 1px solid #10b98144; width: 100%; box-sizing: border-box; }
        .user-card { background: var(--card); padding: 15px; margin: 10px 0; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #334155; }
        .loading-dots:after { content: ' .'; animation: dots 1s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { content: ' .'; } 40% { content: ' ..'; } 60% { content: ' ...'; } 80%, 100% { content: ''; } }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center; color: var(--primary);">✨ 인연 P2P</h2>
    
    <div id="auth-zone">
        <input id="alias" placeholder="닉네임">
        <input id="pass" type="password" placeholder="비밀번호">
        <button id="auth-btn" onclick="handleAuth()">인연의 문 열기</button>
    </div>

    <div id="main-zone" style="display:none;">
        <h3 id="welcome">접속 중...</h3>
        <div id="peer-list"></div>
    </div>

    <div id="log">시스템 준비 중...</div>
</div>

<script>
    // 1. 초기화 및 여러 릴레이 서버 설정 (하나가 죽어도 연결되도록)
    const gun = Gun([
        'https://gun-manhattan.herokuapp.com/gun',
        'https://relay.peer.ooo/gun',
        'https://gun-us.herokuapp.com/gun'
    ]);
    const user = gun.user().recall({storage: true});

    function addLog(msg) {
        const logEl = document.getElementById('log');
        const time = new Date().toLocaleTimeString();
        logEl.innerHTML = `<div>[${time}] ${msg}</div>` + logEl.innerHTML;
        console.log(msg);
    }

    // 라이브러리 로드 확인
    window.onload = () => {
        if (typeof SEA === 'undefined') {
            addLog("❌ 암호화 모듈 로드 실패. 새로고침 하세요.");
        } else {
            addLog("✅ 시스템 준비 완료.");
        }
    };

    async function handleAuth() {
        const alias = document.getElementById('alias').value;
        const pass = document.getElementById('pass').value;
        const btn = document.getElementById('auth-btn');

        if (!alias || !pass) return alert("닉네임과 비번을 입력하세요.");

        btn.disabled = true;
        btn.innerText = "신호 확인 중...";
        addLog(`"${alias}"님으로 접속 시도...`);

        // Gun.js 인증 로직
        user.auth(alias, pass, (ack) => {
            if (ack.err) {
                addLog("신규 유저 확인: 계정을 생성합니다.");
                user.create(alias, pass, (cack) => {
                    if (cack.err) {
                        addLog("❌ 생성 실패: " + cack.err);
                        btn.disabled = false;
                        btn.innerText = "다시 시도";
                    } else {
                        addLog("✅ 생성 완료! 다시 로그인합니다.");
                        handleAuth(); 
                    }
                });
            } else {
                addLog("🎉 인증 성공!");
                startApp(alias, ack.sea.pub);
            }
        });
    }

    function startApp(alias, myPub) {
        document.getElementById('auth-zone').style.display = 'none';
        document.getElementById('main-zone').style.display = 'block';
        document.getElementById('welcome').innerText = `${alias}님, 환영합니다!`;

        // 내 상태 등록
        const heartbeat = () => {
            gun.get('in-yeon-v3-discovery').get(myPub).put({
                name: alias,
                active: Date.now()
            });
        };
        heartbeat();
        setInterval(heartbeat, 30000); // 30초마다 생존 신고

        // 피어 감지
        gun.get('in-yeon-v3-discovery').map().on((data, pub) => {
            if (!data || pub === myPub) return;
            // 2분 이내 활동 유저만 표시
            if (Date.now() - data.active > 120000) return;

            let el = document.getElementById(pub);
            if (!el) {
                el = document.createElement('div');
                el.id = pub;
                el.className = 'user-card';
                document.getElementById('peer-list').appendChild(el);
                addLog(`📡 새로운 인연 발견: ${data.name}`);
            }
            el.innerHTML = `<div><strong>${data.name}</strong><br><small style="color:#10b981">접속 중</small></div>
                            <button style="width:80px; padding:10px; font-size:12px;" onclick="alert('채팅 기능 준비 중!')">대화</button>`;
        });
    }
</script>
</body>
</html>
